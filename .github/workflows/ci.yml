name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache: true

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./...

      - name: Build without CGO
        env:
          CGO_ENABLED: '0'
        run: go build ./...

      - name: Test without CGO
        env:
          CGO_ENABLED: '0'
        run: go test ./...

      - name: Vet
        run: go vet ./...
